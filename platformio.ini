; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_m0]
platform = atmelsam
board = adafruit_feather_m0
framework = arduino
lib_deps = 
	adafruit/Adafruit GFX Library@^1.12.4
	adafruit/Adafruit SH110X@^2.1.14
	arduino-libraries/SD@^1.3.0
	adafruit/RTClib@^2.1.4
	https://github.com/adafruit/Adafruit-MCP23017-Arduino-Library@2.3.2
	https://github.com/adafruit/Adafruit-PWM-Servo-Driver-Library.git
	adafruit/Adafruit ADS1X15@^2.5.0

lib_extra_dirs = 
	../KJO_Shared_Libraries

lib_ignore = 
	Adafruit TinyUSB Library

build_flags = 
	-DUSBCON
	-w  ; Suppress ALL warnings globally (libraries)

; Flags ONLY for YOUR source code (re-enable warnings)
build_src_flags = 
	-Wall    ; Enable all warnings for your code
	-Wextra  ; Enable extra warnings for your code
